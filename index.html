      background: #1a1500; border: 1px solid #3a2e00;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #fbbf24; margin-bottom: 16px;
    }
    .api-key-banner a { color: #fcd34d; }
    .loader { display: inline-block; width: 14px; height: 14px; border: 2px solid #fff3; border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ⚠️ PASTE YOUR ANTHROPIC API KEY BELOW (keep this file in a PRIVATE repo)
const API_KEY = "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";

const TONES = ["Energetic & Hype","Chill & Conversational","Educational","Comedy/Roast","Motivational"];
const MUSIC_MOODS = ["Energetic / Upbeat","Chill / Lo-fi","Cinematic / Epic","Funny / Quirky","Emotional / Inspiring"];

function App() {
  const [images, setImages] = React.useState([]);
  const [mins, setMins] = React.useState("5");
  const [secs, setSecs] = React.useState("0");
  const [tone, setTone] = React.useState("Energetic & Hype");
  const [topic, setTopic] = React.useState("");
  const [context, setContext] = React.useState("");
  const [wantMusic, setWantMusic] = React.useState(null);
  const [musicMood, setMusicMood] = React.useState("Energetic / Upbeat");
  const [script, setScript] = React.useState("");
  const [musicSuggestions, setMusicSuggestions] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");
  const [copied, setCopied] = React.useState(false);
  const fileRef = React.useRef();

  const toBase64 = f => new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.onerror = rej;
    r.readAsDataURL(f);
  });

  const handleFiles = async (files) => {
    const arr = [];
    for (const f of files) {
      if (!f.type.startsWith("image/")) continue;
      const b64 = await toBase64(f);
      arr.push({ name: f.name, data: b64, type: f.type, url: URL.createObjectURL(f) });
    }
    setImages(prev => [...prev, ...arr].slice(0, 4));
  };

  const onDrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };
  const removeImg = (i) => setImages(prev => prev.filter((_, idx) => idx !== i));

  const totalSecs = () => (parseInt(mins || 0) * 60) + parseInt(secs || 0);
  const durationLabel = () => {
    const m = parseInt(mins || 0), s = parseInt(secs || 0);
    if (m === 0) return `${s} sec`;
    if (s === 0) return `${m} min`;
    return `${m} min ${s} sec`;
  };

  const generate = async () => {
    if (!API_KEY || API_KEY === "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") {
      setError("API key nahi daali! index.html file mein API_KEY variable update karo.");
      return;
    }
    if (images.length === 0) { setError("Please upload at least one screenshot."); return; }
    if (totalSecs() < 5) { setError("Please enter a valid duration."); return; }
    setError(""); setScript(""); setMusicSuggestions([]); setLoading(true);

    const words = Math.round((totalSecs() / 60) * 130);

    const content = [
      ...images.map(img => ({ type: "image", source: { type: "base64", media_type: img.type, data: img.data } })),
      {
        type: "text",
        text: `You are an expert Hinglish YouTube script writer for Indian creators.

VIDEO DETAILS:
- Duration: ${durationLabel()} (~${words} words)
- Tone: ${tone}
- Topic/Title: ${topic || "derive from screenshots"}
- Overall video context: ${context || "not provided"}

TASK 1 — MONOLOGUE SCRIPT:
Write a complete Hinglish YouTube monologue script (Hindi + English mix in Roman script, as spoken by Indian YouTubers).
- Hook in the first 10 seconds
- Natural spoken flow with [PAUSE], [SHOW GRAPHIC], [CUT TO] stage directions
- Call to action near the end
- Approximately ${words} words

${wantMusic === "yes" ? `TASK 2 — MUSIC SUGGESTIONS:
After the script, add a section titled "==MUSIC==" and suggest 3 copyright-free YouTube tracks that fit a "${musicMood}" vibe.
For each track, provide exactly this format on one line:
TRACK: <song name> | ARTIST: <artist/channel> | LINK: https://www.youtube.com/watch?v=<real_video_id> | WHY: <one line reason in Hinglish>
Only suggest real, well-known copyright-free tracks from YouTube Audio Library, NCS, or similar.` : ""}

Write ONLY the script (and music section if requested). No preamble.`
      }
    ];

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": API_KEY,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 4000, messages: [{ role: "user", content }] })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const full = data.content?.map(b => b.text || "").join("") || "";
      if (!full) throw new Error("No response received.");

      if (wantMusic === "yes" && full.includes("==MUSIC==")) {
        const [scriptPart, musicPart] = full.split("==MUSIC==");
        setScript(scriptPart.trim());
        const lines = musicPart.split("\n").filter(l => l.startsWith("TRACK:"));
        const parsed = lines.map(l => {
          const get = (key) => { const m = l.match(new RegExp(`${key}: ([^|]+)`)); return m ? m[1].trim() : ""; };
          return { name: get("TRACK"), artist: get("ARTIST"), link: get("LINK"), why: get("WHY") };
        });
        setMusicSuggestions(parsed);
      } else {
        setScript(full.trim());
      }
    } catch (e) {
      setError("Kuch gadbad ho gayi! Try again: " + e.message);
    }
    setLoading(false);
  };

  const copyScript = () => {
    navigator.clipboard.writeText(script);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  const wordCount = script ? script.split(/\s+/).filter(Boolean).length : 0;

  return (
    <div className="container">
      <h1>🎙️ Hinglish Monologue Generator</h1>
      <p className="subtitle">Screenshots + details = ready-to-record YouTube script</p>

      {API_KEY === "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" && (
        <div className="api-key-banner">
          ⚠️ API key missing! Open <code>index.html</code> in a text editor and replace <code>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</code> with your key from <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
        </div>
      )}

      <div className="field">
        <label>Video duration</label>
        <div className="row">
          <input type="number" min="0" max="60" value={mins} onChange={e => setMins(e.target.value)} placeholder="0" />
          <span style={{color:"#666",fontSize:13}}>min</span>
          <input type="number" min="0" max="59" value={secs} onChange={e => setSecs(e.target.value)} placeholder="0" />
          <span style={{color:"#666",fontSize:13}}>sec</span>
          {totalSecs() > 0 && <span className="word-est">≈ {Math.round((totalSecs()/60)*130)} words</span>}
        </div>
      </div>

      <div className="field">
        <label>Tone / Style</label>
        <select value={tone} onChange={e => setTone(e.target.value)}>
          {TONES.map(t => <option key={t}>{t}</option>)}
        </select>
      </div>

      <div className="field">
        <label>Topic / Title <span style={{color:"#555"}}>(optional)</span></label>
        <input type="text" value={topic} onChange={e => setTopic(e.target.value)} placeholder="e.g. iPhone 16 vs Samsung S25..." style={{width:"100%"}} />
      </div>

      <div className="field">
        <label>Overall video context <span style={{color:"#555"}}>(optional)</span></label>
        <p className="hint">Describe the full video — story arc, target audience, key points, etc.</p>
        <textarea value={context} onChange={e => setContext(e.target.value)} rows={3} placeholder="e.g. Yeh video 18-25 saal ke students ke liye hai jo first job ke liye prepare kar rahe hain. Main 5 tips dunga — resume, LinkedIn, mock interviews..." />
      </div>

      <div className="music-box">
        <p>Background music chahiye? 🎵</p>
        <div className="toggle-btns">
          {["yes","no"].map(v => (
            <button key={v} className={`toggle-btn${wantMusic===v?" active":""}`} onClick={() => setWantMusic(v)}>
              {v === "yes" ? "Haan, suggest karo" : "Nahi chahiye"}
            </button>
          ))}
        </div>
        {wantMusic === "yes" && (
          <div className="mood-select">
            <label>Music mood / vibe</label>
            <select value={musicMood} onChange={e => setMusicMood(e.target.value)}>
              {MUSIC_MOODS.map(m => <option key={m}>{m}</option>)}
            </select>
          </div>
        )}
      </div>

      <div className="upload-zone" onDrop={onDrop} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current.click()}>
        <div className="upload-icon">📸</div>
        <p>Drag & drop screenshots, or click to upload</p>
        <small>Up to 4 images</small>
        <input ref={fileRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handleFiles(e.target.files)} />
      </div>

      {images.length > 0 && (
        <div className="thumbs">
          {images.map((img, i) => (
            <div key={i} className="thumb">
              <img src={img.url} alt="" />
              <button className="thumb-remove" onClick={()=>removeImg(i)}>✕</button>
            </div>
          ))}
        </div>
      )}

      {error && <p className="error">{error}</p>}

      <button className="generate-btn" onClick={generate} disabled={loading}>
        {loading ? <><span className="loader"></span>Script likh raha hoon...</> : "⚡ Script Generate Karo"}
      </button>

      {script && (
        <div style={{marginTop:"1.5rem"}}>
          <div className="output-header">
            <span className="word-count">{wordCount} words · {durationLabel()}</span>
            <button className="copy-btn" onClick={copyScript}>{copied ? "✓ Copied!" : "📋 Copy Script"}</button>
          </div>
          <div className="script-box">{script}</div>
        </div>
      )}

      {musicSuggestions.length > 0 && (
        <div className="music-section">
          <h3>🎧 Copyright-free music suggestions</h3>
          {musicSuggestions.map((t, i) => (
            <div key={i} className="music-card">
              <span className="music-icon">🎵</span>
              <div>
                <h4>{t.name}</h4>
                <p className="artist">{t.artist}</p>
                <p className="why">{t.why}</p>
                {t.link && <a href={t.link} target="_blank" rel="noreferrer">▶ YouTube pe dekho</a>}
              </div>
            </div>
          ))}
          <p className="music-tip">Tip: youtube.com/audiolibrary pe jao free tracks download karne ke liye.</p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
